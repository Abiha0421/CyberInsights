<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Crush</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c2f36;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        #logo {
            width: 80%;
            max-width: 300px;
            margin-bottom: 20px;
        }

        #game-board {
            display: grid;
            gap: 5px;
            margin-bottom: 20px;
            width: 100%;
            height: 100%;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(60px, 1fr));
            justify-items: center;
        }

        .block {
            width: 100%;
            height: 100%;
            min-width: 60px;
            min-height: 60px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            background-size: cover;
        }

        .block-type-1 { background-color: #FF5733; }
        .block-type-2 { background-color: #33FF57; }
        .block-type-3 { background-color: #3357FF; }
        .block-type-4 { background-color: #FF33A6; }
        .block-type-5 { background-color: #FFDB33; }

        #scoreboard {
            text-align: center;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Game Logo -->
        <img id="logo" src="https://via.placeholder.com/300x150.png?text=Cyber+Crush" alt="Cyber Crush Logo">
        
        <div id="game-board"></div>
        
        <div id="scoreboard">
            <p id="score">Score: 0</p>
            <p id="level">Level: 1</p>
        </div>
    </div>

    <script>
        const baseSize = 8;
        let gridSize = baseSize;
        let level = 1;
        let score = 0;
        let blocks = [];
        const gameBoard = document.getElementById('game-board');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        let selectedBlock = null;

        function generateBoard() {
            gameBoard.innerHTML = '';
            blocks = [];
            gameBoard.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            gameBoard.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    const block = document.createElement('div');
                    block.classList.add('block');
                    block.classList.add(`block-type-${getRandomInt(1, 5)}`);
                    block.setAttribute('data-x', i);
                    block.setAttribute('data-y', j);
                    block.addEventListener('click', handleBlockClick);
                    gameBoard.appendChild(block);
                    blocks.push(block);
                }
            }
        }

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function handleBlockClick(event) {
            const clickedBlock = event.target;

            if (!selectedBlock) {
                selectedBlock = clickedBlock;
                selectedBlock.style.transform = 'scale(1.1)';
            } else {
                if (selectedBlock !== clickedBlock) {
                    swapBlocks(selectedBlock, clickedBlock);
                }
                selectedBlock.style.transform = 'scale(1)';
                selectedBlock = null;
            }
        }

        function swapBlocks(block1, block2) {
            const tempX = block1.getAttribute('data-x');
            const tempY = block1.getAttribute('data-y');
            block1.setAttribute('data-x', block2.getAttribute('data-x'));
            block1.setAttribute('data-y', block2.getAttribute('data-y'));
            block2.setAttribute('data-x', tempX);
            block2.setAttribute('data-y', tempY);

            const tempClass = block1.className;
            block1.className = block2.className;
            block2.className = tempClass;

            setTimeout(() => {
                checkMatches();
            }, 200); // Wait for the visual swap to complete
        }

        function checkMatches() {
            let matchedBlocks = [];

            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize - 2; j++) {
                    const currentBlock = getBlock(i, j);
                    const nextBlock = getBlock(i, j + 1);
                    const nextNextBlock = getBlock(i, j + 2);
                    if (currentBlock && nextBlock && nextNextBlock &&
                        currentBlock.classList.contains(nextBlock.classList[1]) &&
                        nextBlock.classList.contains(nextNextBlock.classList[1])) {
                        matchedBlocks.push(currentBlock, nextBlock, nextNextBlock);
                    }
                }
            }

            for (let j = 0; j < gridSize; j++) {
                for (let i = 0; i < gridSize - 2; i++) {
                    const currentBlock = getBlock(i, j);
                    const nextBlock = getBlock(i + 1, j);
                    const nextNextBlock = getBlock(i + 2, j);
                    if (currentBlock && nextBlock && nextNextBlock &&
                        currentBlock.classList.contains(nextBlock.classList[1]) &&
                        nextBlock.classList.contains(nextNextBlock.classList[1])) {
                        matchedBlocks.push(currentBlock, nextBlock, nextNextBlock);
                    }
                }
            }

            if (matchedBlocks.length > 0) {
                matchedBlocks.forEach(block => {
                    block.remove();
                    score += 10;
                });
                scoreElement.textContent = `Score: ${score}`;
                updateBoard();
                checkForLevelUp();
            }
        }

        function updateBoard() {
            let blocksRemoved = true;

            while (blocksRemoved) {
                blocksRemoved = false;
                for (let i = 0; i < gridSize; i++) {
                    for (let j = gridSize - 1; j >= 0; j--) {
                        const currentBlock = getBlock(i, j);
                        if (!currentBlock) continue;

                        const nextBlock = getBlock(i, j + 1);
                        if (!nextBlock) {
                            const newBlock = createNewBlock(i, j);
                            blocks.push(newBlock);
                            gameBoard.appendChild(newBlock);
                            blocksRemoved = true;
                        }
                    }
                }
            }
        }

        function createNewBlock(x, y) {
            const block = document.createElement('div');
            block.classList.add('block');
            block.classList.add(`block-type-${getRandomInt(1, 5)}`);
            block.setAttribute('data-x', x);
            block.setAttribute('data-y', y);
            block.addEventListener('click', handleBlockClick);
            return block;
        }

        function getBlock(x, y) {
            return blocks.find(block => block.getAttribute('data-x') == x && block.getAttribute('data-y') == y);
        }

        function checkForLevelUp() {
            if (score >= level * 100) {
                level++;
                levelElement.textContent = `Level: ${level}`;
                gridSize = baseSize + level;
                generateBoard();
            }
        }

        // Start the game
        generateBoard();
    </script>
</body>
</html>
